name: Deploy Hexo to blog_log

on:
  push:
    branches:
      - main  # 你的默认分支，必要时改为 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整历史，便于部署

      # 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # 与本地 Node.js 版本一致

      # 缓存依赖
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 安装 Hexo 和依赖
      - name: Install Dependencies
        run: |
          npm install -g hexo-cli
          npm install

      # 构建 Hexo 站点
      - name: Build Hexo
        run: |
          hexo clean
          hexo generate

      # 部署到 blog_log 分支
      - name: Deploy to blog_log
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: blog_log  # 部署到的分支
          folder: public    # Hexo 生成的静态文件目录
          target-folder: .  # 部署到 blog_log 分支根目录