name: Deploy Hexo to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          npm install
          echo "Dependencies installed successfully"

      - name: Install Hexo CLI
        run: |
          npm install hexo-cli --save-dev
          echo "Hexo CLI installed successfully"

      - name: Build Blog
        run: |
          npx hexo clean
          npx hexo generate
          ls -la public/
          cat public/CNAME || echo "CNAME file missing"
          echo "Blog built successfully"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true